<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Do-It | AI Productivity</title>
  <meta name="description" content="AI-powered productivity app with smart tasks, habit tracking, and gamification" />
  <meta name="theme-color" content="#0f0a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Do-It" />
  <link rel="manifest" href="/manifest.webmanifest" />

  <link rel="icon" type="image/png" href="/logo.png" />

  <div id="root"></div>
